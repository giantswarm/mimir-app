{{- if and .Values.mimir.enabled .Values.crossplane.enabled (include "mimir.crossplane.isAzure" .) .Values.crossplane.azure.enabled }}
{{- /* Mimir storage account */ -}}
{{- if .Values.crossplane.azure.mimir.name }}
{{ include "mimir.crossplane.azure.account" (dict "root" . "containerName" .Values.crossplane.azure.mimir.name "component" "mimir") }}
{{- end }}
{{- /* Ruler storage account */ -}}
{{- if .Values.crossplane.azure.ruler.name }}
{{ include "mimir.crossplane.azure.account" (dict "root" . "containerName" .Values.crossplane.azure.ruler.name "component" "ruler") }}
{{- end }}
{{- /* Alertmanager storage account */ -}}
{{- if .Values.crossplane.azure.alertmanager.name }}
{{ include "mimir.crossplane.azure.account" (dict "root" . "containerName" .Values.crossplane.azure.alertmanager.name "component" "alertmanager") }}
{{- end }}
{{- end }}
