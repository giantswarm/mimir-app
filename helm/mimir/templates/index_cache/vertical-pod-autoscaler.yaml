{{- if and .Values.mimir.enabled (index .Values.mimir "index-cache" "enabled") (index .Values.mimir "index-cache" "verticalAutoscaling" "enabled") }}
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: {{ include "mimir.resourceName" (dict "ctx" . "component" "index-cache") }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
    {{- include "mimir.labels" (dict "ctx" . "component" "index-cache") | nindent 4 }}
spec:
  resourcePolicy:
    containerPolicies:
    - containerName: ingester
      controlledValues: RequestsAndLimits
      minAllowed:
        cpu: {{ index .Values.mimir "index-cache" "verticalAutoscaling" "minAllowed" "cpu" }}
        memory: {{ index .Values.mimir "index-cache" "verticalAutoscaling" "minAllowed" "memory" }}
      maxAllowed:
        cpu: {{ index .Values.mimir "index-cache" "verticalAutoscaling" "maxAllowed" "cpu" }}
        memory: {{ index .Values.mimir "index-cache" "verticalAutoscaling" "maxAllowed" "memory" }}
      mode: Auto
  targetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "mimir.resourceName" (dict "ctx" . "component" "index-cache") }}
  updatePolicy:
    updateMode: Auto
{{- end }}
