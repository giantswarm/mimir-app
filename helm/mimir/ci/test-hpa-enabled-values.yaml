# Test HPA (Horizontal Pod Autoscaler) enabled for querier and distributor
# KEDA is disabled in this test to test traditional HPA
mimir:
  enabled: true

hpa:
  distributor:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: 85
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Percent
            value: 100
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 50
            periodSeconds: 120
  querier:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 75
    targetMemoryUtilizationPercentage: 80

kedaAutoscaling:
  querier:
    enabled: false
  gateway:
    enabled: false
