# Test combined features: Gateway Routes + AWS Crossplane + KEDA
# This tests multiple internal Giant Swarm features together
mimir:
  enabled: true

routes:
  gateway:
    enabled: true
    kind: HTTPRoute
    hostnames:
      - mimir.test.giantswarm.io
    parentRefs:
      - name: giantswarm-default
        namespace: envoy-gateway-system
    additionalRules:
      - backendRefs:
          - name: mimir-gateway
            port: 80
        matches:
          - headers:
              - name: "X-Scope-OrgID"
                value: "^.+$"
                type: RegularExpression
            path:
              type: PathPrefix
              value: /api/v1/push
        filters:
          - type: ResponseHeaderModifier
            responseHeaderModifier:
              set:
                - name: X-Scope-OrgID
                  value: "%REQ(X-Scope-OrgID)%"
    matches:
      - path:
          type: PathPrefix
          value: /api/v1/push
    filters:
      - type: ExtensionRef
        extensionRef:
          group: gateway.envoyproxy.io
          kind: HTTPRouteFilter
          name: mimir-gateway
    securityPolicy:
      enabled: true
      basicAuth:
        users:
          group: ""
          kind: Secret
          name: mimir-gateway-httproute-auth
          namespace: mimir
    backendTrafficPolicy:
      enabled: true
      requestBuffer:
        limit: 50Mi

crossplane:
  enabled: true
  observeOnly: false
  provider: aws
  providerConfigRef: combined-test
  clusterName: combined-test
  clusterNamespace: org-giantswarm
  region: us-east-1
  tags:
    - key: app
      value: mimir
    - key: installation
      value: combined-test
  aws:
    enabled: true
    mimir:
      name: giantswarm-combined-test-mimir
      tags:
        - key: name
          value: giantswarm-combined-test-mimir
    ruler:
      name: giantswarm-combined-test-mimir-ruler
      tags:
        - key: name
          value: giantswarm-combined-test-mimir-ruler
    alertmanager:
      name: giantswarm-combined-test-mimir-alertmanager
      tags:
        - key: name
          value: giantswarm-combined-test-mimir-alertmanager
    iam:
      enabled: true

kedaAutoscaling:
  querier:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    pollingInterval: 30
    cooldownPeriod: 300
    fallback:
      failureThreshold: 5
      replicas: 5
      behavior: "currentReplicasIfHigher"
    triggers:
      - type: cpu
        metricType: Utilization
        metadata:
          value: "90"
      - metadata:
          serverAddress: http://mimir-query-frontend.mimir.svc.cluster.local:8080/prometheus
          query: |
            sum(
              max_over_time(cortex_query_scheduler_inflight_requests{
                  container="query-scheduler",namespace="mimir",quantile="0.5"
              }[1m])
            )
          threshold: '12.0'
          customHeaders: X-Scope-OrgID=giantswarm
          ignoreNullValues: "true"
          timeout: "30000"
        type: prometheus
  gateway:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    pollingInterval: 30
    cooldownPeriod: 300
    fallback:
      failureThreshold: 5
      replicas: 2
      behavior: "currentReplicasIfHigher"
    triggers:
      - type: cpu
        metricType: Utilization
        metadata:
          value: "90"

hpa:
  distributor:
    enabled: false
  querier:
    enabled: false
